spring.application.name=eureka-server
# ===================================================================
# EUREKA SERVER CONFIGURATION
# ===================================================================

# The port where the Eureka dashboard and registry will run.
# 8761 is the well-known, conventional port for Eureka.
server.port=8761
# -------------------------------------------------------------------
# WHY THESE TWO ARE FALSE:
# A Eureka Server is the registry itself. It should NOT try to register
# with another registry, nor fetch a list of services from one, because
# it iS the source of truth. For a single standalone server we turn both off.
# -------------------------------------------------------------------
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# -------------------------------------------------------------------
# SELF-PRESERVATION:
# In development we turn this off so that services which stop are removed
# quickly from the dashboard. In production you normally leave it ON (true)
# to avoid wrongly evicting services during temporary network hiccups.
# -------------------------------------------------------------------
#eureka.server.enable-self-preservation=false